<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Soul Seeking">
  <rect width="100" height="100" rx="14" fill="#15110D"/>
  <g stroke="#E7C68B" stroke-width="1.1" stroke-linecap="round" fill="none" opacity="0.95">
    <!-- radiating dawn rays from a low centre -->
    <g transform="translate(50 64)">
      <line x1="0" y1="0" x2="0" y2="-34"/>
      <line x1="0" y1="0" x2="11" y2="-32"/>
      <line x1="0" y1="0" x2="21" y2="-27"/>
      <line x1="0" y1="0" x2="29" y2="-18"/>
      <line x1="0" y1="0" x2="34" y2="-7"/>
      <line x1="0" y1="0" x2="-11" y2="-32"/>
      <line x1="0" y1="0" x2="-21" y2="-27"/>
      <line x1="0" y1="0" x2="-29" y2="-18"/>
      <line x1="0" y1="0" x2="-34" y2="-7"/>
    </g>
  </g>
  <!-- sun disc -->
  <circle cx="50" cy="40" r="10" fill="#CC914E"/>
  <circle cx="50" cy="40" r="10" fill="none" stroke="#E7C68B" stroke-width="1.4"/>
</svg>
